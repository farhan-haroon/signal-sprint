<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Intelligent trash detection system that identifies trash outside waste bins using computer vision.">
  <title>Analog Minds — Trash Detection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #080808;
      --surface: #0f0f0f;
      --surface2: #151515;
      --border: #1e1e1e;
      --border-hover: #2e2e2e;
      --text-primary: #d4d4d4;
      --text-secondary: #555;
      --text-muted: #333;
      --accent: #c8f542;
      --accent-dim: rgba(200, 245, 66, 0.07);
      --accent-dim2: rgba(200, 245, 66, 0.15);
      --danger: #ff4444;
      --danger-dim: rgba(255, 68, 68, 0.08);
      --warning: #f5a623;
      --warning-dim: rgba(245, 166, 35, 0.08);
      --success: #c8f542;
      --success-dim: rgba(200, 245, 66, 0.08);
      --mono: 'Space Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* Subtle grid texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.013) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.013) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── TOP BAR ── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 56px;
      border-bottom: 1px solid var(--border);
      background: rgba(8,8,8,0.92);
      backdrop-filter: blur(12px);
      animation: slideDown 0.5s ease both;
    }

    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: blink 3s ease infinite;
    }

    @keyframes blink {
      0%, 90%, 100% { opacity: 1; }
      95% { opacity: 0; }
    }

    .brand-name {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-primary);
    }

    .topbar-tag {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── LAYOUT ── */
    .app {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 340px 1fr;
      min-height: calc(100vh - 56px);
    }

    /* ── LEFT PANEL ── */
    .panel-left {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      background: var(--surface);
      padding: 40px 28px;
      gap: 32px;
      animation: fadeInLeft 0.6s ease 0.1s both;
    }

    .panel-title {
      font-size: 10px;
      font-family: var(--mono);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0;
    }

    /* ── DROP ZONE ── */
    .dropzone {
      position: relative;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 36px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: border-color 0.25s, background 0.25s;
      background: var(--bg);
      overflow: hidden;
    }

    .dropzone::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent-dim);
      opacity: 0;
      transition: opacity 0.25s;
    }

    .dropzone:hover::before,
    .dropzone.drag-over::before {
      opacity: 1;
    }

    .dropzone:hover,
    .dropzone.drag-over {
      border-color: var(--accent);
    }

    .dropzone input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      z-index: 2;
      width: 100%;
      height: 100%;
    }

    .dz-icon {
      width: 36px;
      height: 36px;
      color: var(--text-muted);
      transition: color 0.25s;
      position: relative;
      z-index: 1;
    }

    .dropzone:hover .dz-icon,
    .dropzone.drag-over .dz-icon {
      color: var(--accent);
    }

    .dz-label {
      font-size: 13px;
      color: var(--text-secondary);
      text-align: center;
      line-height: 1.6;
      position: relative;
      z-index: 1;
    }

    .dz-label em {
      font-style: normal;
      color: var(--accent);
    }

    .dz-sub {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-muted);
      text-align: center;
      position: relative;
      z-index: 1;
    }

    /* ── FILE BADGE ── */
    .file-badge {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
    }

    .file-badge.show { display: flex; }

    .file-badge-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    /* ── BUTTONS ── */
    .btn-row {
      display: flex;
      gap: 8px;
    }

    .btn {
      flex: 1;
      padding: 11px 16px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface2);
      color: var(--text-secondary);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      white-space: nowrap;
    }

    .btn:hover:not(:disabled) {
      border-color: var(--border-hover);
      color: var(--text-primary);
    }

    .btn-primary {
      background: var(--accent-dim);
      border-color: rgba(200,245,66,0.25);
      color: var(--accent);
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--accent-dim2);
      border-color: rgba(200,245,66,0.5);
      color: var(--accent);
      box-shadow: 0 0 20px rgba(200,245,66,0.1);
    }

    .btn-danger {
      border-color: rgba(255,68,68,0.2);
      color: rgba(255,68,68,0.6);
    }

    .btn-danger:hover:not(:disabled) {
      border-color: rgba(255,68,68,0.5);
      color: var(--danger);
      background: rgba(255,68,68,0.05);
    }

    .btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .btn svg {
      width: 13px;
      height: 13px;
      flex-shrink: 0;
    }

    /* ── ACTION ROW ── */
    .action-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn-run {
      width: 100%;
      padding: 14px;
      border: 1px solid rgba(200,245,66,0.3);
      border-radius: 4px;
      background: var(--accent-dim);
      color: var(--accent);
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-run:hover:not(:disabled) {
      background: var(--accent-dim2);
      border-color: rgba(200,245,66,0.6);
      box-shadow: 0 0 30px rgba(200,245,66,0.12);
    }

    .btn-run:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-run svg { width: 14px; height: 14px; }

    /* ── STATUS ── */
    .status-area {
      min-height: 20px;
    }

    .status-msg {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-msg.processing {
      color: var(--accent);
    }

    .status-spinner {
      width: 10px;
      height: 10px;
      border: 1.5px solid rgba(200,245,66,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── INFO SECTION ── */
    .info-block {
      margin-top: auto;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }

    .info-row:last-child { border-bottom: none; }

    .info-val { color: var(--text-secondary); }

    /* ── RIGHT PANEL ── */
    .panel-right {
      display: flex;
      flex-direction: column;
      padding: 40px 36px;
      background: var(--bg);
      overflow-y: auto;
      min-height: 0;
      animation: fadeIn 0.6s ease 0.2s both;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      opacity: 0.4;
      text-align: center;
    }

    .empty-icon {
      width: 48px;
      height: 48px;
      color: var(--text-muted);
    }

    .empty-text {
      font-size: 13px;
      color: var(--text-muted);
      font-family: var(--mono);
      letter-spacing: 0.08em;
    }

    /* ── GALLERY ── */
    .gallery-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 24px;
    }

    .gallery-title {
      font-size: 10px;
      font-family: var(--mono);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .gallery-count {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--accent);
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    /* ── IMAGE CARD ── */
    .img-card {
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      background: var(--surface);
      animation: cardIn 0.4s ease both;
      transition: border-color 0.2s;
    }

    .img-card:hover { border-color: var(--border-hover); }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .img-card-inner {
      position: relative;
      aspect-ratio: 1;
      overflow: hidden;
      background: var(--bg);
    }

    .img-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .img-card-name {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 6px 10px;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
      font-family: var(--mono);
      font-size: 9px;
      color: rgba(255,255,255,0.5);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .img-card-result {
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .result-indicator {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .result-indicator.ok     { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .result-indicator.alert  { background: var(--danger);  box-shadow: 0 0 6px var(--danger); }
    .result-indicator.warn   { background: var(--warning); box-shadow: 0 0 6px var(--warning); }

    .result-text-group {
      display: flex;
      flex-direction: column;
      gap: 2px;
      overflow: hidden;
    }

    .result-label {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }

    .result-label.ok     { color: var(--success); }
    .result-label.alert  { color: var(--danger); }
    .result-label.warn   { color: var(--warning); }

    .result-sub {
      font-size: 10px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── ERROR CARD ── */
    .error-card {
      border: 1px solid rgba(255,68,68,0.15);
      border-radius: 4px;
      padding: 14px;
      background: rgba(255,68,68,0.04);
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--danger);
      animation: cardIn 0.4s ease both;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes fadeInLeft {
      from { opacity: 0; transform: translateX(-16px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-100%); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 860px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }

      .panel-left {
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 28px 20px;
        gap: 20px;
      }

      .info-block { display: none; }
      .panel-right { padding: 28px 20px; }
    }

    @media (max-width: 520px) {
      .topbar { padding: 0 16px; }
      .panel-left, .panel-right { padding: 20px 16px; }
      .gallery { grid-template-columns: 1fr 1fr; gap: 10px; }
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<header class="topbar">
  <div class="topbar-brand">
    <div class="brand-dot"></div>
    <span class="brand-name">Analog Minds</span>
  </div>
  <span class="topbar-tag">IITK · Trash Detection System · v1.0</span>
</header>

<!-- APP -->
<div class="app">

  <!-- LEFT PANEL -->
  <aside class="panel-left">

    <p class="panel-title">// Input</p>

    <!-- DROP ZONE -->
    <div class="dropzone" id="dropzone">
      <input type="file" id="fileInput" accept="image/*" multiple aria-label="Upload images">
      <input type="file" id="folderInput" webkitdirectory directory multiple style="display:none">
      <svg class="dz-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <p class="dz-label">Drop images here or <em>click to browse</em></p>
      <p class="dz-sub">JPG · PNG · WEBP · supports batch</p>
    </div>

    <!-- FILE BADGE -->
    <div class="file-badge" id="fileBadge">
      <div class="file-badge-dot"></div>
      <span id="fileCount">0 files staged</span>
    </div>

    <!-- SECONDARY BTNS -->
    <div class="btn-row">
      <button class="btn" onclick="document.getElementById('fileInput').click()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        Add Files
      </button>
      <button class="btn" onclick="document.getElementById('folderInput').click()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
        Add Folder
      </button>
    </div>

    <!-- PRIMARY ACTION -->
    <div class="action-row">
      <button class="btn-run" id="runBtn" onclick="runInference()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Run Inference
      </button>
      <button class="btn btn-danger" onclick="clearAll()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
        Clear All
      </button>
    </div>

    <!-- STATUS -->
    <div class="status-area">
      <div class="status-msg" id="statusMsg"></div>
    </div>

    <!-- INFO BLOCK -->
    <div class="info-block">
      <div class="info-row">
        <span>Model</span>
        <span class="info-val">YOLOv8 · Det + Seg</span>
      </div>
      <div class="info-row">
        <span>Resolution</span>
        <span class="info-val">512 × 512</span>
      </div>
      <div class="info-row">
        <span>Det threshold</span>
        <span class="info-val">0.45</span>
      </div>
      <div class="info-row">
        <span>Seg threshold</span>
        <span class="info-val">0.25</span>
      </div>
      <div class="info-row">
        <span>Scope</span>
        <span class="info-val">IITK Campus</span>
      </div>
    </div>

  </aside>

  <!-- RIGHT PANEL -->
  <main class="panel-right" id="panelRight">

    <!-- EMPTY STATE -->
    <div class="empty-state" id="emptyState">
      <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      <p class="empty-text">// no results yet</p>
    </div>

    <!-- GALLERY -->
    <div id="galleryWrap" style="display:none; flex-direction: column;">
      <div class="gallery-header">
        <span class="gallery-title">// Detection Results</span>
        <span class="gallery-count" id="galleryCount"></span>
      </div>
      <div class="gallery" id="gallery"></div>
    </div>

  </main>
</div>

<script>
  const API = "https://corsage-drainable-trimmer.ngrok-free.dev/predict";

  let staged = [];

  const fileInput   = document.getElementById('fileInput');
  const folderInput = document.getElementById('folderInput');
  const dropzone    = document.getElementById('dropzone');
  const fileBadge   = document.getElementById('fileBadge');
  const fileCount   = document.getElementById('fileCount');
  const runBtn      = document.getElementById('runBtn');
  const statusMsg   = document.getElementById('statusMsg');
  const gallery     = document.getElementById('gallery');
  const galleryWrap = document.getElementById('galleryWrap');
  const emptyState  = document.getElementById('emptyState');
  const galleryCount = document.getElementById('galleryCount');

  /* ── FILE HANDLING ── */
  fileInput.addEventListener('change', e => addFiles(e.target.files));
  folderInput.addEventListener('change', e => addFiles(e.target.files));

  function addFiles(fileList) {
    const imgs = Array.from(fileList).filter(f => f.type.startsWith('image/'));
    staged = staged.concat(imgs);
    fileInput.value = '';
    folderInput.value = '';
    updateBadge();
  }

  function updateBadge() {
    if (staged.length > 0) {
      fileBadge.classList.add('show');
      fileCount.textContent = `${staged.length} image${staged.length !== 1 ? 's' : ''} staged`;
    } else {
      fileBadge.classList.remove('show');
    }
  }

  /* ── DRAG & DROP ── */
  dropzone.addEventListener('dragover', e => {
    e.preventDefault();
    dropzone.classList.add('drag-over');
  });

  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));

  dropzone.addEventListener('drop', e => {
    e.preventDefault();
    dropzone.classList.remove('drag-over');
    addFiles(e.dataTransfer.files);
  });

  /* ── CLEAR ── */
  function clearAll() {
    staged = [];
    gallery.innerHTML = '';
    galleryCount.textContent = '';
    galleryWrap.style.display = 'none';
    emptyState.style.display = 'flex';
    setStatus('');
    updateBadge();
  }

  /* ── STATUS ── */
  function setStatus(msg, type = '') {
    if (!msg) { statusMsg.innerHTML = ''; return; }
    if (type === 'processing') {
      statusMsg.className = 'status-msg processing';
      statusMsg.innerHTML = `<div class="status-spinner"></div>${msg}`;
    } else {
      statusMsg.className = 'status-msg';
      statusMsg.textContent = msg;
    }
  }

  /* ── INFERENCE ── */
  async function runInference() {
    if (staged.length === 0) {
      setStatus('no files staged');
      return;
    }

    runBtn.disabled = true;
    emptyState.style.display = 'none';
    galleryWrap.style.display = 'flex';
    setStatus(`processing ${staged.length} image${staged.length !== 1 ? 's' : ''}…`, 'processing');

    let processed = 0;

    for (const file of staged) {
      const fd = new FormData();
      fd.append('file', file);

      try {
        const res  = await fetch(API, { method: 'POST', body: fd });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        appendCard(file.name, data.image, data.bin_detected, data.prediction);
        processed++;
        setStatus(`processed ${processed}/${staged.length}…`, 'processing');

      } catch (err) {
        appendErrorCard(file.name, err.message);
        processed++;
      }

      galleryCount.textContent = `(${gallery.childElementCount})`;
    }

    setStatus(`done · ${processed} image${processed !== 1 ? 's' : ''} processed`);
    staged = [];
    updateBadge();
    runBtn.disabled = false;
  }

  /* ── CARD BUILDERS ── */
  function appendCard(name, imgB64, binDetected, prediction) {
    let cls, label, sub;

    if (!binDetected) {
      cls = 'warn'; label = 'No DMC Call'; sub = 'Dustbin not detected';
    } else if (prediction === 1.0) {
      cls = 'alert'; label = 'DMC Call Required'; sub = 'Trash outside dustbin detected';
    } else {
      cls = 'ok'; label = 'No DMC Call'; sub = 'Area properly maintained';
    }

    const card = document.createElement('div');
    card.className = 'img-card';
    card.style.animationDelay = `${gallery.childElementCount * 60}ms`;
    card.innerHTML = `
      <div class="img-card-inner">
        <img src="data:image/jpeg;base64,${imgB64}" alt="${name}" loading="lazy">
        <div class="img-card-name">${name}</div>
      </div>
      <div class="img-card-result">
        <div class="result-indicator ${cls}"></div>
        <div class="result-text-group">
          <span class="result-label ${cls}">${label}</span>
          <span class="result-sub">${sub}</span>
        </div>
      </div>
    `;
    gallery.appendChild(card);
  }

  function appendErrorCard(name, errMsg) {
    const card = document.createElement('div');
    card.className = 'error-card';
    card.style.animationDelay = `${gallery.childElementCount * 60}ms`;
    card.innerHTML = `
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
      <span>Failed: ${name} — ${errMsg}</span>
    `;
    gallery.appendChild(card);
  }
</script>
