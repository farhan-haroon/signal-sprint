<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Intelligent trash detection system that identifies trash outside waste bins using computer vision.">
  <title>Trash Detection - AI-Powered Detection System</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      background: #0d0d0d;
      color: #999;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      background: #0d0d0d;
      overflow: visible;
    }

    .upload-section {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px 40px;
      border-right: 1px solid #222;
    }

    .preview-section {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      padding: 60px 40px;
      background: #111;
      overflow-y: auto;
      min-height: 100vh;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 40px;
      animation: fadeInDown 0.6s ease;
    }

    .header svg {
      width: 32px;
      height: 32px;
      color: #666;
    }

    h1 {
      font-size: 28px;
      font-weight: 400;
      letter-spacing: 1px;
      color: #888;
    }

    .upload-area {
      position: relative;
      width: 100%;
      max-width: 300px;
      margin-bottom: 30px;
      animation: fadeInUp 0.6s ease 0.1s both;
    }

    .file-input-wrapper {
      position: relative;
      overflow: hidden;
    }

    #fileInput {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
      z-index: 2;
    }

    .upload-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 40px;
      border: 1px solid #333;
      border-radius: 8px;
      transition: all 0.3s ease;
      cursor: pointer;
      background: transparent;
    }

    .upload-label:hover {
      border-color: #555;
      background: transparent;
      transform: none;
    }

    .upload-label svg {
      width: 40px;
      height: 40px;
      color: #666;
      transition: color 0.3s ease;
    }

    .upload-label:hover svg {
      color: #888;
      transform: none;
    }

    .upload-text {
      text-align: center;
      font-size: 14px;
      color: #666;
    }

    .upload-text span {
      display: block;
      color: #666;
      font-weight: 400;
      margin-top: 4px;
    }

    .file-name {
      font-size: 12px;
      color: #4CAF50;
      margin-top: 8px;
      word-break: break-all;
      max-width: 280px;
    }

    button {
      width: 100%;
      padding: 14px;
      border: 1px solid #333;
      border-radius: 8px;
      background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
      color: #888;
      font-size: 15px;
      font-weight: 400;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
      animation: fadeInUp 0.6s ease 0.2s both;
    }

    button:hover:not(:disabled) {
      border-color: #4CAF50;
      color: #4CAF50;
      box-shadow: 0 0 20px rgba(76, 175, 80, 0.2);
      transform: none;
    }

    button:active:not(:disabled) {
      transform: none;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status-text {
      margin-top: 20px;
      font-size: 14px;
      color: #666;
      animation: fadeInUp 0.6s ease 0.3s both;
    }

    .preview-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
      max-width: 500px;
      padding-bottom: 40px;
    }

    #preview {
      width: 100%;
      max-width: 500px;
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
      display: none;
      animation: fadeIn 0.5s ease;
      border: 1px solid #222;
    }

    #preview.show {
      display: block;
    }

    .result {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 400;
      text-align: center;
      opacity: 0;
      transition: all 0.3s ease;
      width: 100%;
      box-sizing: border-box;
    }

    .result.show {
      opacity: 1;
      animation: slideIn 0.4s ease;
    }

    .result svg {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
    }

    .result.success {
      background: rgba(76, 175, 80, 0.1);
      color: #4CAF50;
      border: 1px solid #4CAF50;
    }

    .result.danger {
      background: rgba(244, 67, 54, 0.1);
      color: #F44336;
      border: 1px solid #F44336;
    }

    .result.warning {
      background: rgba(255, 152, 0, 0.1);
      color: #FF9800;
      border: 1px solid #FF9800;
    }

    .result.error {
      background: rgba(255, 152, 0, 0.1);
      color: #FF9800;
      border: 1px solid #FF9800;
    }

    .result-content {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      text-align: left;
      width: 100%;
      overflow-wrap: break-word;
    }

    .result-title {
      font-weight: 600;
      font-size: 16px;
    }

    .result-comment {
      font-size: 13px;
      opacity: 0.9;
      font-weight: 300;
      word-wrap: break-word;
      white-space: normal;
      overflow-wrap: break-word;
    }

    .loading {
      font-size: 14px;
      color: #666;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.6;
      }
    }

    @media (max-width: 1024px) {
      .container {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
        min-height: auto;
      }

      .upload-section {
        border-right: none;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        padding: 40px 30px;
        min-height: auto;
        justify-content: flex-start;
        padding-top: 30px;
      }

      .preview-section {
        border-right: none;
        padding: 30px 20px;
        min-height: auto;
        overflow-y: visible;
        justify-content: flex-start;
        padding-top: 20px;
      }
    }

    @media (max-width: 640px) {
      body {
        align-items: flex-start;
      }

      .container {
        min-height: auto;
      }

      .upload-section {
        padding: 25px 15px;
        justify-content: flex-start;
        min-height: auto;
        border-right: none;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      .preview-section {
        padding: 20px 15px;
        min-height: auto;
        overflow-y: visible;
        justify-content: flex-start;
      }

      h1 {
        font-size: 22px;
      }

      button {
        padding: 12px;
        font-size: 14px;
      }

      #preview {
        max-width: 100%;
        margin-bottom: 15px;
      }

      .result {
        padding: 14px 16px;
        gap: 10px;
        min-height: auto;
        width: 100%;
        box-sizing: border-box;
        margin-bottom: 20px;
      }

      .result svg {
        width: 20px;
        height: 20px;
        min-width: 20px;
        flex-shrink: 0;
      }

      .result-content {
        gap: 8px;
        width: 100%;
        text-align: left;
      }

      .result-title {
        font-size: 14px;
        font-weight: 600;
      }

      .result-comment {
        font-size: 12px;
        line-height: 1.6;
        word-wrap: break-word;
        white-space: normal;
        overflow-wrap: break-word;
        width: 100%;
        display: block;
      }

      .preview-container {
        max-width: 100%;
        padding: 0;
        width: 100%;
        gap: 15px;
        padding-bottom: 30px;
      }

      .upload-area {
        max-width: 100%;
      }

      .file-name {
        max-width: 100px;
        font-size: 11px;
      }
    }

    @media (max-width: 480px) {
      body {
        align-items: flex-start;
      }

      .container {
        min-height: auto;
      }

      .upload-section {
        padding: 20px 12px;
        justify-content: flex-start;
        min-height: auto;
        border-right: none;
      }

      .preview-section {
        padding: 15px 12px;
        min-height: auto;
        overflow-y: visible;
        justify-content: flex-start;
      }

      .header {
        margin-bottom: 20px;
        gap: 10px;
      }

      .header svg {
        width: 26px;
        height: 26px;
      }

      h1 {
        font-size: 19px;
        letter-spacing: 0.5px;
      }

      .upload-area {
        margin-bottom: 15px;
      }

      .upload-label {
        padding: 25px 18px;
        gap: 10px;
      }

      .upload-label svg {
        width: 30px;
        height: 30px;
      }

      .upload-text {
        font-size: 11px;
      }

      .upload-text span {
        margin-top: 2px;
        font-size: 10px;
      }

      button {
        padding: 10px;
        font-size: 12px;
      }

      #preview {
        max-width: 100%;
        margin-bottom: 12px;
      }

      .result {
        padding: 12px 12px;
        font-size: 12px;
        gap: 10px;
        width: 100%;
        box-sizing: border-box;
        flex-wrap: nowrap;
        align-items: flex-start;
        margin-bottom: 25px;
        min-height: auto;
        border-radius: 6px;
      }

      .result svg {
        width: 16px;
        height: 16px;
        min-width: 16px;
        flex-shrink: 0;
        margin-top: 3px;
      }

      .result-content {
        gap: 5px;
        width: 100%;
        text-align: left;
      }

      .result-title {
        font-size: 12px;
        font-weight: 600;
        line-height: 1.3;
      }

      .result-comment {
        font-size: 10px;
        line-height: 1.5;
        word-wrap: break-word;
        white-space: normal;
        overflow-wrap: break-word;
        width: 100%;
        display: block;
      }

      .preview-container {
        gap: 12px;
        width: 100%;
        max-width: 100%;
        padding: 0;
        padding-bottom: 30px;
      }

      .status-text {
        margin-top: 12px;
        font-size: 11px;
      }

      .file-name {
        max-width: 90px;
        font-size: 10px;
      }
    }
  </style>
</head>

<body>

<div class="container" role="main">
  <section class="upload-section" aria-labelledby="upload-heading">
    <header class="header">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 2c5.523 0 10 4.477 10 10s-4.477 10-10 10S2 17.523 2 12 6.477 2 12 2z"></path>
        <path d="M12 6v12M6 12h12" stroke="#4CAF50"></path>
      </svg>
      <h1 id="upload-heading">Trash Detection</h1>
    </header>

    <div class="upload-area">
      <div class="file-input-wrapper">
        <input type="file" id="fileInput" accept="image/*" aria-label="Upload image for trash detection">
        <label for="fileInput" class="upload-label" role="button" tabindex="0">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
          <div class="upload-text">
            Click to upload or drag
            <span>Select an image</span>
          </div>
        </label>
      </div>
      <div id="fileName" class="file-name"></div>
    </div>

    <button onclick="upload()" id="uploadBtn" aria-label="Run inference on uploaded image">
      <svg style="display: inline; width: 18px; height: 18px; margin-right: 8px; vertical-align: middle;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10"></circle>
        <polyline points="12 6 12 12 16 14"></polyline>
      </svg>
      Run Inference
    </button>

    <p id="status" class="status-text" role="status" aria-live="polite"></p>
  </section>

  <section class="preview-section" aria-labelledby="preview-heading">
    <div class="preview-container">
      <h2 id="preview-heading" style="display: none;">Detection Result</h2>
      <img id="preview" alt="Preview and detection result of uploaded image" />
      <div id="result" class="result" role="alert" aria-live="polite"></div>
    </div>
  </section>
</div>

<script>
// Update file name display when a file is selected
document.getElementById("fileInput").addEventListener("change", (e) => {
    const fileNameEl = document.getElementById("fileName");
    if (e.target.files.length > 0) {
        fileNameEl.textContent = `📄 ${e.target.files[0].name}`;
    } else {
        fileNameEl.textContent = "";
    }
});

async function upload() {
    const fileInput = document.getElementById("fileInput");
    const file = fileInput.files[0];
    const statusEl = document.getElementById("status");
    const resultEl = document.getElementById("result");
    const previewEl = document.getElementById("preview");
    const uploadBtn = document.getElementById("uploadBtn");

    if (!file) {
        resultEl.className = "result error show";
        resultEl.innerHTML = `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          <div class="result-content">
            <span class="result-title">No File Selected</span>
            <span class="result-comment">Please select an image first</span>
          </div>
        `;
        return;
    }

    // Validate file is an image
    if (!file.type.startsWith('image/')) {
        resultEl.className = "result error show";
        resultEl.innerHTML = `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          <div class="result-content">
            <span class="result-title">Invalid File Type</span>
            <span class="result-comment">Please select a valid image file (JPG, PNG, etc.)</span>
          </div>
        `;
        return;
    }

    const formData = new FormData();
    formData.append("file", file);

    // Show preview instantly
    previewEl.src = URL.createObjectURL(file);
    previewEl.classList.add("show");

    // UI state
    statusEl.innerHTML = '<span class="loading">⏳ Processing image...</span>';
    resultEl.classList.remove("show");
    uploadBtn.disabled = true;

    try {
        const res = await fetch("https://amusable-corrosive-chunk.ngrok-free.dev/predict", {
            method: "POST",
            body: formData
        });

        if (!res.ok) {
            throw new Error(`HTTP error! status: ${res.status}`);
        }

        const data = await res.json();

        // Remove loading
        statusEl.innerHTML = "";

        // Show annotated image (with boxes + mask)
        previewEl.src = "data:image/jpeg;base64," + data.image;

        // Check if IITK dustbin is detected first
        if (!data.bin_detected) {
            // No IITK dustbin found
            resultEl.className = "result warning show";
            resultEl.innerHTML = `
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3.05h16.94a2 2 0 0 0 1.71-3.05L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                <line x1="12" y1="9" x2="12" y2="13"></line>
                <line x1="12" y1="17" x2="12.01" y2="17"></line>
              </svg>
              <div class="result-content">
                <span class="result-title">No DMC Call</span>
                <span class="result-comment">IITK dustbin not detected in the image - Cannot evaluate trash status</span>
              </div>
            `;
        } else if (data.prediction === 1.0) {
            // IITK dustbin detected and trash found outside
            resultEl.className = "result danger show";
            resultEl.innerHTML = `
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
              </svg>
              <div class="result-content">
                <span class="result-title">DMC Call Required</span>
                <span class="result-comment">Trash detected outside IITK dustbin - Immediate DMC attention required</span>
              </div>
            `;
        } else {
            // IITK dustbin detected and clean (no trash outside)
            resultEl.className = "result success show";
            resultEl.innerHTML = `
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
              <div class="result-content">
                <span class="result-title">No DMC Call</span>
                <span class="result-comment">No trash detected outside IITK dustbin - Area properly maintained</span>
              </div>
            `;
        }

    } catch (err) {
        console.error(err);
        statusEl.innerHTML = "";
        resultEl.className = "result error show";
        resultEl.innerHTML = `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="15" y1="9" x2="9" y2="15"></line>
            <line x1="9" y1="9" x2="15" y2="15"></line>
          </svg>
          <div class="result-content">
            <span class="result-title">Error</span>
            <span class="result-comment">Failed to process image - Please check connection and try again</span>
          </div>
        `;
    } finally {
        uploadBtn.disabled = false;
    }
}

// Drag and drop functionality
const fileInput = document.getElementById("fileInput");
const uploadLabel = document.querySelector(".upload-label");

uploadLabel.addEventListener("dragover", (e) => {
    e.preventDefault();
    e.stopPropagation();
    uploadLabel.style.borderColor = "rgba(76, 175, 80, 0.8)";
    uploadLabel.style.background = "rgba(76, 175, 80, 0.15)";
});

uploadLabel.addEventListener("dragleave", (e) => {
    e.preventDefault();
    e.stopPropagation();
    uploadLabel.style.borderColor = "rgba(255, 255, 255, 0.3)";
    uploadLabel.style.background = "rgba(76, 175, 80, 0.05)";
});

uploadLabel.addEventListener("drop", (e) => {
    e.preventDefault();
    e.stopPropagation();
    uploadLabel.style.borderColor = "rgba(255, 255, 255, 0.3)";
    uploadLabel.style.background = "rgba(76, 175, 80, 0.05)";
    
    const files = e.dataTransfer.files;
    if (files.length > 0) {
        // Validate file is an image
        if (files[0].type.startsWith('image/')) {
            fileInput.files = files;
            // Trigger change event manually
            fileInput.dispatchEvent(new Event('change', { bubbles: true }));
        }
    }
});

// Allow spacebar and enter to activate upload label
uploadLabel.addEventListener("keydown", (e) => {
    if (e.key === " " || e.key === "Enter") {
        e.preventDefault();
        fileInput.click();
    }
});
</script>

</body>
</html>
