<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Trash Detection</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: #eee;
}

.container {
  display: flex;
  height: 100vh;
}

/* sidebar */
.sidebar {
  width: 250px;
  padding: 20px;
  background: #1a1a1a;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

button {
  padding: 10px;
  border: none;
  cursor: pointer;
}

.run { background: #c8f542; color: black; }
.clear { background: #ff4444; color: white; }

/* main */
.main {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 15px;
}

.card {
  background: #222;
  padding: 10px;
}

.card img {
  width: 100%;
}

/* status */
.status {
  font-size: 12px;
  color: #aaa;
}
</style>
</head>

<body>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <input type="file" id="files" multiple>
    <input type="file" id="folder" webkitdirectory multiple>

    <button class="run" onclick="run()">Run Inference</button>
    <button class="clear" onclick="clearAll()">Clear</button>

    <div class="status" id="status"></div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="gallery" id="gallery"></div>
  </div>

</div>

<script>
const API = "https://corsage-drainable-trimmer.ngrok-free.dev/predict";

let files = [];

document.getElementById('files').onchange = e => addFiles(e.target.files);
document.getElementById('folder').onchange = e => addFiles(e.target.files);

function addFiles(f) {
  files = files.concat(Array.from(f));
  setStatus(files.length + " files selected");
}

function setStatus(msg) {
  document.getElementById('status').innerText = msg;
}

function clearAll() {
  files = [];
  document.getElementById('gallery').innerHTML = "";
  setStatus("cleared");
}

async function run() {
  if (!files.length) {
    setStatus("no files");
    return;
  }

  setStatus("processing...");
  const gallery = document.getElementById('gallery');

  for (let file of files) {
    let fd = new FormData();
    fd.append("file", file);

    try {
      let res = await fetch(API, { method: "POST", body: fd });
      let data = await res.json();

      let div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <img src="data:image/jpeg;base64,${data.image}">
        <p>${getLabel(data.bin_detected, data.prediction)}</p>
      `;

      gallery.appendChild(div);

    } catch (e) {
      let div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `<p>Error: ${file.name}</p>`;
      gallery.appendChild(div);
    }
  }

  setStatus("done");
  files = [];
}

function getLabel(bin, pred) {
  if (!bin) return "No bin detected";
  if (pred === 1.0) return "Trash detected (DMC required)";
  return "Clean";
}
</script>

</body>
</html>
