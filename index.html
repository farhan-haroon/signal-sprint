<!DOCTYPE html>
<html>
<head>
  <title>Trash Detection</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 90%;
      max-width: 420px;
      text-align: center;
    }

    h2 {
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      margin: 10px 0;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #4CAF50;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #45a049;
    }

    img {
      width: 100%;
      border-radius: 8px;
      margin-top: 15px;
    }

    .result {
      margin-top: 15px;
      font-size: 18px;
      font-weight: bold;
    }

    .loading {
      color: #888;
      font-size: 14px;
    }

    @media (max-width: 480px) {
      .container {
        padding: 15px;
      }
    }
  </style>
</head>

<body>

<div class="container">
  <h2>🧠 Trash Detection</h2>

  <input type="file" id="fileInput" accept="image/*">

  <button onclick="upload()">Run Inference</button>

  <p id="status" class="loading"></p>
  <p id="result" class="result"></p>

  <img id="preview"/>
</div>

<script>
async function upload() {
    const fileInput = document.getElementById("fileInput");
    const file = fileInput.files[0];

    if (!file) {
        alert("Please select an image");
        return;
    }

    const formData = new FormData();
    formData.append("file", file);

    // show preview instantly
    document.getElementById("preview").src = URL.createObjectURL(file);

    // UI state
    document.getElementById("status").innerText = "Processing...";
    document.getElementById("result").innerText = "";

    try {
        const res = await fetch("https://corsage-drainable-trimmer.ngrok-free.dev/predict", {
            method: "POST",
            body: formData
        });

        const data = await res.json();

        // remove loading
        document.getElementById("status").innerText = "";

        // show annotated image (with boxes + mask)
        document.getElementById("preview").src =
            "data:image/jpeg;base64," + data.image;

        // result text
        if (data.prediction === 1.0) {
            document.getElementById("result").innerText =
                "🚨 Trash detected outside bin";
            document.getElementById("result").style.color = "red";
        } else {
            document.getElementById("result").innerText =
                "✅ No issue detected";
            document.getElementById("result").style.color = "green";
        }

    } catch (err) {
        console.error(err);
        document.getElementById("status").innerText = "";
        document.getElementById("result").innerText = "❌ Error occurred";
    }
}
</script>

</body>
</html>
