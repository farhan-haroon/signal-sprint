<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Intelligent trash detection system that identifies trash outside waste bins using computer vision.">
  <title>Trash Detection - AI-Powered Detection System</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      background: #0d0d0d;
      color: #999;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      background: #0d0d0d;
      overflow: visible;
    }

    .upload-section {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px 40px;
      border-right: 1px solid #222;
    }

    .preview-section {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      padding: 60px 40px;
      background: #111;
      overflow-y: auto;
      min-height: 100vh;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 40px;
      animation: fadeInDown 0.6s ease;
    }

    .header svg {
      width: 32px;
      height: 32px;
      color: #666;
    }

    h1 {
      font-size: 28px;
      font-weight: 400;
      letter-spacing: 1px;
      color: #888;
    }

    .upload-area {
      position: relative;
      width: 100%;
      max-width: 300px;
      margin-bottom: 30px;
      animation: fadeInUp 0.6s ease 0.1s both;
    }

    .file-input-wrapper {
      position: relative;
      overflow: hidden;
    }

    #fileInput {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
      z-index: 2;
    }

    .upload-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 40px;
      border: 1px solid #333;
      border-radius: 8px;
      transition: all 0.3s ease;
      cursor: pointer;
      background: transparent;
    }

    .upload-label:hover {
      border-color: #555;
      background: transparent;
      transform: none;
    }

    .upload-label svg {
      width: 40px;
      height: 40px;
      color: #666;
      transition: color 0.3s ease;
    }

    .upload-label:hover svg {
      color: #888;
      transform: none;
    }

    .upload-text {
      text-align: center;
      font-size: 14px;
      color: #666;
    }

    .upload-text span {
      display: block;
      color: #666;
      font-weight: 400;
      margin-top: 4px;
    }

    .file-name {
      font-size: 12px;
      color: #4CAF50;
      margin-top: 8px;
      word-break: break-all;
      max-width: 280px;
    }

    .upload-buttons {
      display: flex;
      gap: 12px;
      width: 100%;
      margin-top: 15px;
    }

    .upload-buttons button {
      flex: 1;
      margin: 0;
      animation: fadeInUp 0.6s ease 0.2s both;
    }

    .button-group {
      display: flex;
      gap: 10px;
      width: 100%;
    }

    .button-group button {
      flex: 1;
      margin: 0;
    }

    .upload-buttons {
      display: flex;
      gap: 12px;
      width: 100%;
      margin-top: 15px;
    }

    .upload-buttons button {
      flex: 1;
      margin: 0;
      animation: fadeInUp 0.6s ease 0.2s both;
    }

    .buttons-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    .button-group {
      display: flex;
      gap: 10px;
      width: 100%;
    }

    .button-group button {
      flex: 1;
      margin: 0;
    }

    .gallery-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      width: 100%;
      max-width: 100%;
      justify-content: center;
      padding-bottom: 40px;
    }

    .image-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      flex: 1 1 calc(50% - 10px);
      min-width: 250px;
      max-width: 350px;
    }

    .image-card img {
      width: 100%;
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
      border: 1px solid #222;
      animation: fadeIn 0.5s ease;
    }

    .image-card .result {
      width: 100%;
      margin-bottom: 0;
    }

    button {
      width: 100%;
      padding: 14px;
      border: 1px solid #333;
      border-radius: 8px;
      background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
      color: #888;
      font-size: 15px;
      font-weight: 400;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
      animation: fadeInUp 0.6s ease 0.2s both;
    }

    button:hover:not(:disabled) {
      border-color: #4CAF50;
      color: #4CAF50;
      box-shadow: 0 0 20px rgba(76, 175, 80, 0.2);
      transform: none;
    }

    button:active:not(:disabled) {
      transform: none;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status-text {
      margin-top: 20px;
      font-size: 14px;
      color: #666;
      animation: fadeInUp 0.6s ease 0.3s both;
    }

    .preview-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
      max-width: 100%;
      padding-bottom: 40px;
    }

    .result {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 400;
      text-align: center;
      opacity: 0;
      transition: all 0.3s ease;
      width: 100%;
      box-sizing: border-box;
    }

    .result.show {
      opacity: 1;
      animation: slideIn 0.4s ease;
    }

    .result svg {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
    }

    .result.success {
      background: rgba(76, 175, 80, 0.1);
      color: #4CAF50;
      border: 1px solid #4CAF50;
    }

    .result.danger {
      background: rgba(244, 67, 54, 0.1);
      color: #F44336;
      border: 1px solid #F44336;
    }

    .result.warning {
      background: rgba(255, 152, 0, 0.1);
      color: #FF9800;
      border: 1px solid #FF9800;
    }

    .result.error {
      background: rgba(255, 152, 0, 0.1);
      color: #FF9800;
      border: 1px solid #FF9800;
    }

    .result-content {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      text-align: left;
      width: 100%;
      overflow-wrap: break-word;
    }

    .result-title {
      font-weight: 600;
      font-size: 16px;
    }

    .result-comment {
      font-size: 13px;
      opacity: 0.9;
      font-weight: 300;
      word-wrap: break-word;
      white-space: normal;
      overflow-wrap: break-word;
    }

    .loading {
      font-size: 14px;
      color: #666;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.6;
      }
    }

    @media (max-width: 1024px) {
      .container {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
        min-height: auto;
      }

      .upload-section {
        border-right: none;

      }

      .result-content {

      .result-title {

      }

      .result-comment {
        font-size: 12px;
        line-height: 1.6;

      }

      .preview-container {

      }

      .upload-buttons {

      }

      .upload-buttons button {

      }

      .button-group {

      }

      .button-group button {

      }

      .button-group {

    @media (max-width: 480px) {

      }

      .header {
        margin-bottom: 20px;

      }

      .header svg {

      }

      h1 {
        font-size: 19px;

      .upload-area {

      .upload-label {
        padding: 25px 18px;

      }

      .upload-text {

      .upload-text span {

      #preview {

      .result {

<body>

<div class="container" role="main">
  <section class="upload-section" aria-labelledby="upload-heading">
    <header class="header">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 2c5.523 0 10 4.477 10 10s-4.477 10-10 10S2 17.523 2 12 6.477 2 12 2z"></path>
        <path d="M12 6v12M6 12h12" stroke="#4CAF50"></path>
      </svg>
      <h1 id="upload-heading">Trash Detection</h1>
    </header>

    <div class="upload-area">
      <div class="file-input-wrapper">
        <input type="file" id="fileInput" accept="image/*" multiple aria-label="Upload images for trash detection">
        <label for="fileInput" class="upload-label" role="button" tabindex="0">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
          <div class="upload-text">
            Click to upload or drag
            <span>Select images</span>
          </div>
        </label>
      </div>
      <input type="file" id="folderInput" webkitdirectory directory multiple hidden aria-label="Upload folder">
      <div id="fileName" class="file-name"></div>
    </div>

    <div class="upload-buttons">
      <button onclick="document.getElementById('fileInput').click()" aria-label="Browse and select images">
        📁 Add Files
      </button>
      <button onclick="document.getElementById('folderInput').click()" aria-label="Browse and select folder">
        📂 Add Folder
      </button>
    </div>

    <div class="button-group">
      <button onclick="upload()" id="uploadBtn" aria-label="Run inference on uploaded images">
        <svg style="display: inline; width: 18px; height: 18px; margin-right: 8px; vertical-align: middle;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="10"></circle>
          <polyline points="12 6 12 12 16 14"></polyline>
        </svg>
        Run Inference
      </button>
      <button onclick="clearGallery()" id="clearBtn" style="border-color: #ff6b6b; color: #ff6b6b;" aria-label="Clear all results">
        Clear All
      </button>
    </div>

    <p id="status" class="status-text" role="status" aria-live="polite"></p>
  </section>

  <section class="preview-section" aria-labelledby="preview-heading">
    <div class="preview-container">
      <h2 id="preview-heading" style="display: none;">Detection Results</h2>
      <div id="galleryContainer" class="gallery-container"></div>
      <div id="result" class="result" role="alert" aria-live="polite"></div>
    </div>
  </section>
</div>

<script>
// Update file name display when files are selected
document.getElementById("fileInput").addEventListener("change", (e) => {
    updateFileDisplay();
});

document.getElementById("folderInput").addEventListener("change", (e) => {
    updateFileDisplay();
});

function updateFileDisplay() {
    const fileInput = document.getElementById("fileInput");
    const folderInput = document.getElementById("folderInput");
    const fileNameEl = document.getElementById("fileName");
    
    const fileCount = fileInput.files.length + folderInput.files.length;
    
    if (fileCount > 0) {
        fileNameEl.textContent = `📁 ${fileCount} file${fileCount !== 1 ? 's' : ''} selected`;
    } else {
        fileNameEl.textContent = "";
    }
}

function clearGallery() {
    const galleryEl = document.getElementById("galleryContainer");
    const fileNameEl = document.getElementById("fileName");
    
    // Clear file inputs
    document.getElementById("fileInput").value = '';
    document.getElementById("folderInput").value = '';
    
    // Clear display
    galleryEl.innerHTML = '';
    fileNameEl.textContent = '';
    document.getElementById("status").innerHTML = '';
    
    updateFileDisplay();
}

function getResultHTML(binDetected, prediction) {
    if (!binDetected) {
        return {
            className: "result warning show",
            html: `
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3.05h16.94a2 2 0 0 0 1.71-3.05L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                <line x1="12" y1="9" x2="12" y2="13"></line>
                <line x1="12" y1="17" x2="12.01" y2="17"></line>
              </svg>
              <div class="result-content">
                <span class="result-title">No DMC Call</span>
                <span class="result-comment">IITK dustbin not detected - Cannot evaluate trash status</span>
              </div>
            `
        };
    } else if (prediction === 1.0) {
        return {
            className: "result danger show",
            html: `
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
              </svg>
              <div class="result-content">
                <span class="result-title">DMC Call Required</span>
                <span class="result-comment">Trash detected outside IITK dustbin - Immediate DMC attention required</span>
              </div>
            `
        };
    } else {
        return {
            className: "result success show",
            html: `
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
              <div class="result-content">
                <span class="result-title">No DMC Call</span>
                <span class="result-comment">No trash detected outside IITK dustbin - Area properly maintained</span>
              </div>
            `
        };
    }
}

async function upload() {
    const fileInput = document.getElementById("fileInput");
    const folderInput = document.getElementById("folderInput");
    
    // Combine files from both inputs
    const allFiles = Array.from(fileInput.files).concat(Array.from(folderInput.files));
    
    const statusEl = document.getElementById("status");
    const galleryEl = document.getElementById("galleryContainer");
    const uploadBtn = document.getElementById("uploadBtn");

    if (allFiles.length === 0) {
        statusEl.innerHTML = `
          <div class="result error show" style="width: 100%; max-width: 500px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="8" x2="12" y2="12"></line>
              <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            <div class="result-content">
              <span class="result-title">No Files Selected</span>
              <span class="result-comment">Please select at least one image</span>
            </div>
          </div>
        `;
        return;
    }

    // Validate all files are images
    for (let file of allFiles) {
        if (!file.type.startsWith('image/')) {
            statusEl.innerHTML = `
              <div class="result error show" style="width: 100%; max-width: 500px;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"></circle>
                  <line x1="12" y1="8" x2="12" y2="12"></line>
                  <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
                <div class="result-content">
                  <span class="result-title">Invalid File Type</span>
                  <span class="result-comment">Please select valid image files only (JPG, PNG, etc.)</span>
                </div>
              </div>
            `;
            return;
        }
    }

    // Show loading
    statusEl.innerHTML = `<span class="loading">⏳ Processing ${allFiles.length} image${allFiles.length !== 1 ? 's' : ''}...</span>`;
    uploadBtn.disabled = true;

    try {
        // Process each image
        for (let file of allFiles) {
            const formData = new FormData();
            formData.append("file", file);

            try {
                const res = await fetch("https://amusable-corrosive-chunk.ngrok-free.dev/predict", {
                    method: "POST",
                    body: formData
                });

                if (!res.ok) {
                    throw new Error(`HTTP error! status: ${res.status}`);
                }

                const data = await res.json();

                // Create image card with result
                const imageCard = document.createElement("div");
                imageCard.className = "image-card";

                const img = document.createElement("img");
                img.src = "data:image/jpeg;base64," + data.image;
                img.alt = file.name;

                const resultDiv = document.createElement("div");
                const resultData = getResultHTML(data.bin_detected, data.prediction);
                resultDiv.className = resultData.className;
                resultDiv.innerHTML = resultData.html;

                imageCard.appendChild(img);
                imageCard.appendChild(resultDiv);
                galleryEl.appendChild(imageCard);

            } catch (err) {
                console.error(err);
                
                // Add error card
                const imageCard = document.createElement("div");
                imageCard.className = "image-card";

                const errorDiv = document.createElement("div");
                errorDiv.className = "result error show";
                errorDiv.style.width = "100%";
                errorDiv.innerHTML = `
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="15" y1="9" x2="9" y2="15"></line>
                    <line x1="9" y1="9" x2="15" y2="15"></line>
                  </svg>
                  <div class="result-content">
                    <span class="result-title">Error</span>
                    <span class="result-comment">Failed to process ${file.name}</span>
                  </div>
                `;
                imageCard.appendChild(errorDiv);
                galleryEl.appendChild(imageCard);
            }
        }

        statusEl.innerHTML = '';
        
        // Clear file inputs after processing so user can add more
        fileInput.value = '';
        folderInput.value = '';
        updateFileDisplay();

    } catch (err) {
        console.error(err);
        statusEl.innerHTML = "";
    } finally {
        uploadBtn.disabled = false;
    }
}

// Drag and drop functionality
const fileInput = document.getElementById("fileInput");
const uploadLabel = document.querySelector(".upload-label");

uploadLabel.addEventListener("dragover", (e) => {
    e.preventDefault();
    e.stopPropagation();
    uploadLabel.style.borderColor = "rgba(76, 175, 80, 0.8)";
    uploadLabel.style.background = "rgba(76, 175, 80, 0.15)";
});

uploadLabel.addEventListener("dragleave", (e) => {
    e.preventDefault();
    e.stopPropagation();
    uploadLabel.style.borderColor = "rgba(255, 255, 255, 0.3)";
    uploadLabel.style.background = "rgba(76, 175, 80, 0.05)";
});

uploadLabel.addEventListener("drop", (e) => {
    e.preventDefault();
    e.stopPropagation();
    uploadLabel.style.borderColor = "rgba(255, 255, 255, 0.3)";
    uploadLabel.style.background = "rgba(76, 175, 80, 0.05)";
    
    const files = e.dataTransfer.files;
    if (files.length > 0) {
        // Check if all files are images
        let allValidImages = true;
        for (let file of files) {
            if (!file.type.startsWith('image/')) {
                allValidImages = false;
                break;
            }
        }
        
        if (allValidImages) {
            fileInput.files = files;
            // Trigger change event manually
            fileInput.dispatchEvent(new Event('change', { bubbles: true }));
        }
    }
});

// Allow spacebar and enter to activate upload label
uploadLabel.addEventListener("keydown", (e) => {
    if (e.key === " " || e.key === "Enter") {
        e.preventDefault();
        fileInput.click();
    }
});
</script>
